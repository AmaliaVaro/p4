    <body class="login-reg">
        <a href="index.html" class="boton-inicio"> &#127968</a>
        <section class="columna">

            <h1>Crear una cuenta</h1>
            <form onsubmit="debugger">

                    <legend>Nueva cuenta:</legend>

                    <input type="text" id="reg-username" name="username"><br>
                    <label for="lastnames">Apellidos:</label><br>

                    <input type="password" id="reg-password" name="password"><br>

                    <br>
                    <button type="submit">submit</button><br>
